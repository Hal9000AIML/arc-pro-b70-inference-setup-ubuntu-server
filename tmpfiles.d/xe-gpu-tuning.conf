# Intel xe GPU tuning — belt-and-suspenders alongside xe-tuning.service.
# All per-engine sysfs writes are done by /usr/local/bin/xe_tuning.sh because
# the paths contain a PCI-address-dependent prefix and cannot be enumerated by
# tmpfiles.d globs.
#
# Note: pcie_aspm policy is intentionally NOT set here. The kernel cmdline
# already includes `pcie_aspm=off`, which locks the policy sysfs read-only
# (writes return EPERM). xe_tuning.sh attempts the write opportunistically
# with a fallback, which is the correct approach.
